services:
  backend:
    build:
      context: ./backend
      target: runtime
    environment:
      APP_PORT: "8080"
      STORAGE_UPLOAD_DIR: ${STORAGE_UPLOAD_DIR:-/var/app/data/uploads}
      STORAGE_HLS_DIR: ${STORAGE_HLS_DIR:-/var/app/data/hls}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8000}
      FFMPEG_BIN: ${FFMPEG_BIN:-ffmpeg}
      DATABASE_URL: ${DATABASE_URL:-mysql://perfectcat:perfectcat@db:3306/perfectcat?parseTime=true&loc=UTC&charset=utf8mb4}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY:-}
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME:-PerfectCatStreaming}
      NEW_RELIC_LOG_LEVEL: ${NEW_RELIC_LOG_LEVEL:-}
      APP_ENV: ${APP_ENV:-dev}
      NEW_RELIC_AI_MONITORING_ENABLED: ${NEW_RELIC_AI_MONITORING_ENABLED:-false}
      NEW_RELIC_CUSTOM_INSIGHTS_EVENTS_MAX_SAMPLES_STORED: ${NEW_RELIC_CUSTOM_INSIGHTS_EVENTS_MAX_SAMPLES_STORED:-10000}
      NEW_RELIC_AI_MONITORING_STREAMING_ENABLED: ${NEW_RELIC_AI_MONITORING_STREAMING_ENABLED:-false}
      # Force HTTP/1.1 for NR ingest — Docker Desktop on macOS sometimes drops
      # large HTTP/2 POSTs to Cloudflare-fronted origins (causes the agent's
      # `connect` to fail with EOF).
      GODEBUG: ${GODEBUG:-http2client=0}
      # Chaos (NR troubleshooting demo). Default off; flip via .env.
      CHAOS_ENABLED: ${CHAOS_ENABLED:-false}
      CHAOS_PERIOD_SEC: ${CHAOS_PERIOD_SEC:-300}
      CHAOS_WINDOW_SEC: ${CHAOS_WINDOW_SEC:-60}
      CHAOS_LATENCY_CHANCE_PERCENT: ${CHAOS_LATENCY_CHANCE_PERCENT:-40}
      CHAOS_LATENCY_MIN_MS: ${CHAOS_LATENCY_MIN_MS:-500}
      CHAOS_LATENCY_MAX_MS: ${CHAOS_LATENCY_MAX_MS:-2000}
      CHAOS_ERROR_CHANCE_PERCENT: ${CHAOS_ERROR_CHANCE_PERCENT:-0}
      CHAOS_DB_SLOW_PERIOD_SEC: ${CHAOS_DB_SLOW_PERIOD_SEC:-0}
      CHAOS_DB_SLOW_QUERY_SEC: ${CHAOS_DB_SLOW_QUERY_SEC:-5}
      CHAOS_DB_SLOW_CONCURRENCY: ${CHAOS_DB_SLOW_CONCURRENCY:-3}
    volumes:
      - ${HOST_DATA_DIR:-./data}:/var/app/data
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      schema:
        condition: service_completed_successfully
    restart: unless-stopped

  schema:
    build:
      context: ./infra/schema
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./infra/schema:/schema:ro
    command:
      - "-h"
      - "db"
      - "-P"
      - "3306"
      - "-u"
      - "${MYSQL_USER:-perfectcat}"
      - "-p${MYSQL_PASSWORD:-perfectcat}"
      - "${MYSQL_DATABASE:-perfectcat}"
      - "--file=/schema/schema.sql"
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_NEW_RELIC_LICENSE_KEY: ${VITE_NEW_RELIC_LICENSE_KEY:-}
        VITE_NEW_RELIC_APP_ID: ${VITE_NEW_RELIC_APP_ID:-}
        VITE_NEW_RELIC_ACCOUNT_ID: ${VITE_NEW_RELIC_ACCOUNT_ID:-}
        VITE_NEW_RELIC_TRUST_KEY: ${VITE_NEW_RELIC_TRUST_KEY:-}
        VITE_NEW_RELIC_AGENT_ID: ${VITE_NEW_RELIC_AGENT_ID:-}
        VITE_NEW_RELIC_VIDEO_APP_ID: ${VITE_NEW_RELIC_VIDEO_APP_ID:-}
        VITE_PLAYER_CHAOS_ERROR_RATE: ${VITE_PLAYER_CHAOS_ERROR_RATE:-0.2}
    ports:
      - "8000:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-perfectcat}
      MYSQL_USER: ${MYSQL_USER:-perfectcat}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-perfectcat}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql-data:
